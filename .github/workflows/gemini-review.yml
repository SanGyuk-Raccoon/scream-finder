name: Gemini AI Code Review

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'src/**' # Only review changes in the source code

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # Required to post review comments

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Gemini AI Code Review
        uses: google-gemini/gemini-review-action@v1
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          model: "gemini-1.5-flash" # Fast and stable for free tier
          custom_prompt: |
            당신은 2인 협업(Server & Front-end) 체제의 ScrimFinder 프로젝트 리드 개발자입니다.
            개발자가 자신의 코드뿐만 아니라, **상대방 개발자의 영역에 미칠 영향**을 명확히 인지할 수 있도록 다음 구조에 따라 리뷰를 작성해 주세요.

            ### 1. 🔍 변경 사항 요약 (What's Changed)
            - 수정된 파일들이 시스템 전체 로직에서 어떤 변화를 만드는지 요약해 주세요.

            ### 2. 🔗 상호 영향 분석 (Cross-domain Impact) - **가장 중요**
            - **서버 변경이 프론트에 주는 영향**: API 응답 구조나 타입(Layer 0) 변경이 프론트엔드 컴포넌트에 어떤 영향을 주는지 분석하세요. (예: "서버의 이 필드 삭제로 인해 프론트의 XX 페이지가 깨질 수 있습니다.")
            - **프론트 변경이 서버에 주는 영향**: 호출 빈도, 파라미터 구조 변경이 서버 부하나 데이터 무결성에 주는 영향을 체크하세요. (예: "프론트의 이 루프 호출이 서버에 과부하를 줄 수 있습니다.")

            ### 3. ⚠️ 영역별 리스크 진단 (Role-Specific Assessment)

            #### 🖥️ Server-side Focus (Layer 1-3)
            - `server-only` 격리 준수 여부, 에러 핸들링, 비즈니스 로직(logic/)의 순수성 확인.
            - 프론트엔드 개발자가 알아야 할 서버 로직의 특이사항 지적.

            #### 🎨 Front-side Focus (Layer 4)
            - UI 상호작용의 효율성, Server Actions 호출 방식의 적절성 확인.
            - 서버 개발자가 알아야 할 프론트엔드의 데이터 요구사항 변화 지적.

            ### 4. 🧪 테스트 및 안정성 (Stability)
            - 새로운 로직에 대한 테스트 코드(*.test.ts) 포함 여부와 엣지 케이스 커버리지 확인.

            ### 5. 💡 협업을 위한 제안 (Collaboration Advice)
            - 발견된 리스크에 대해 구체적인 코드 예시와 함께 **두 개발자가 함께 논의해야 할 부분**을 제시해 주세요.

            ### 📝 작성 지침:
            - **언어**: 반드시 한국어(Korean)로 작성하세요.
            - **태도**: 서로의 영역을 존중하며 협업을 촉진하는 톤을 유지하세요.
            - **효율성**: 핵심 위주로 명료하게 작성하여 두 개발자의 소통 비용을 낮추세요.
