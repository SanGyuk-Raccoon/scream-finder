name: Domain Access Control

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  check-access:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Domain Access
        run: |
          AUTHOR="${{ github.event.pull_request.user.login }}"
          echo "PR Author: $AUTHOR"

          # 변경된 파일 목록 추출
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          
          VIOLATION=false

          # 1. frndhoon (Front Dev) 규칙 검사
          if [ "$AUTHOR" == "frndhoon" ]; then
            for file in $CHANGED_FILES; do
              if [[ $file == src/server/* ]] || [[ $file == src/shared/* ]]; then
                echo "❌ ERROR: 'frndhoon' is not allowed to modify server or shared domains ($file)"
                VIOLATION=true
              fi
            done
          fi

          # 2. byoul (Server Dev) 규칙 검사
          if [ "$AUTHOR" == "byoul" ]; then
            for file in $CHANGED_FILES; do
              if [[ $file == src/app/* ]] || [[ $file == src/client/* ]]; then
                echo "❌ ERROR: 'byoul' is not allowed to modify app or client domains ($file)"
                VIOLATION=true
              fi
            done
          fi

          if [ "$VIOLATION" = true ]; then
            echo "--------------------------------------------------------"
            echo "⚠️  Access Denied: You have modified files outside your domain."
            echo "Please request a change from the responsible developer instead."
            exit 1
          else
            echo "✅ Domain access verified. No violations found."
          fi
