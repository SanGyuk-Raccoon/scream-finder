name: CI Pipeline

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  # Stage 1: domain access gatekeeper
  check-access:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ job.status }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Domain Access
        id: verify
        run: |
          AUTHOR="${{ github.event.pull_request.user.login }}"
          echo "PR Author: $AUTHOR"

          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          VIOLATION=false

          if [ "$AUTHOR" == "frndhoon" ]; then
            for file in $CHANGED_FILES; do
              if [[ $file == src/server/* ]] || [[ $file == src/shared/* ]]; then
                echo "ERROR: 'frndhoon' is not allowed to modify server or shared domains ($file)"
                VIOLATION=true
              fi
            done
          fi

          if [ "$AUTHOR" == "byoul" ]; then
            for file in $CHANGED_FILES; do
              if [[ $file == src/app/* ]] || [[ $file == src/client/* ]]; then
                echo "ERROR: 'byoul' is not allowed to modify app or client domains ($file)"
                VIOLATION=true
              fi
            done
          fi

          if [ "$VIOLATION" = true ]; then
            echo "--------------------------------------------------------"
            echo "Access denied: you modified files outside your domain."
            echo "Please request a change from the responsible developer instead."
            exit 1
          else
            echo "Domain access verified. No violations found."
          fi

  # Stage 2: lint and test after access checks pass
  test:
    needs: [check-access]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Lint check
        run: npm run lint

      - name: Run unit tests
        run: npm run test
